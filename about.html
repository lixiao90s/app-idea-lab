    <h1>关于 App Idea Lab</h1>
    <p>App Idea Lab 帮助独立开发者和创业者发现 App Store 中被忽视的细分市场机会。</p>

    <h2>分析维度</h2>
    <ul>
      <li>市场需求（评论量）</li>
      <li>竞品质量（评分）</li>
      <li>维护活跃度（最后更新时间）</li>
      <li>用户痛点强度</li>
      <li>变现潜力</li>
      <li>搜索热度（代理指标）</li>
    </ul>

    <h2>数据说明</h2>
    <p>所有数据来自 Apple 公开 API。下载量估算和搜索热度为算法推算，<strong>非 Apple 官方数据</strong>，仅供参考。</p>

    <h2>致谢</h2>
    <p>本项目基于开源项目 <a href="https://github.com/vccyb/appstore-idea-find" target="_blank" rel="noopener">appstore-idea-find</a> 改造。</p>
